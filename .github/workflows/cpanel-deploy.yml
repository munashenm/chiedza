name: Build static site for cPanel

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://www.chiedzaimmigration.co.za
          NEXT_PUBLIC_FORM_EMAIL: info@chiedzaimmigration.co.za

      - name: Deploy to cpanel-deploy branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: cpanel-deploy
          single-commit: false
          clean: true
